  <rect x="184" y="26" width="28" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="218" y="26" width="28" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="252" y="26" width="28" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>

