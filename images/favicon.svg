<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#f5c5a3"/>

  <!-- Hair (back) -->
  <ellipse cx="32" cy="22" rx="18" ry="20" fill="#1a1a1a"/>

  <!-- Face -->
  <ellipse cx="32" cy="30" rx="13" ry="14" fill="#f5c5a3"/>

  <!-- Hair (top + sides flowing) -->
  <ellipse cx="32" cy="14" rx="18" ry="10" fill="#1a1a1a"/>
  <rect x="14" y="14" width="6" height="22" rx="3" fill="#1a1a1a"/>
  <rect x="44" y="14" width="6" height="22" rx="3" fill="#1a1a1a"/>

  <!-- Ears -->
  <ellipse cx="19" cy="30" rx="3" ry="4" fill="#f5c5a3"/>
  <ellipse cx="45" cy="30" rx="3" ry="4" fill="#f5c5a3"/>

  <!-- Eyes -->
  <ellipse cx="26" cy="28" rx="3" ry="3.2" fill="#1a1a1a"/>
  <ellipse cx="38" cy="28" rx="3" ry="3.2" fill="#1a1a1a"/>
  <circle cx="27.2" cy="27" r="1" fill="#ffffff"/>
  <circle cx="39.2" cy="27" r="1" fill="#ffffff"/>

  <!-- Eyebrows -->
  <path d="M22 23 Q26 21 30 23" stroke="#1a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M34 23 Q38 21 42 23" stroke="#1a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
