  <!-- Smile -->
  <path d="M26 37 Q32 42 38 37" stroke="#c97b5a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="22" cy="35" rx="4" ry="2.5" fill="rgba(255,150,130,0.35)"/>
  <ellipse cx="42" cy="35" rx="4" ry="2.5" fill="rgba(255,150,130,0.35)"/>

  <!-- Neck -->
  <rect x="28" y="43" width="8" height="7" rx="2" fill="#f5c5a3"/>

  <!-- Shoulders / body -->
  <ellipse cx="32" cy="56" rx="18" ry="10" fill="#6c63ff"/>
  <ellipse cx="18" cy="52" rx="7" ry="6" fill="#6c63ff"/>
  <ellipse cx="46" cy="52" rx="7" ry="6" fill="#6c63ff"/>
